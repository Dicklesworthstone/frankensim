[package]
name = "fs-time"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Structure-preserving time integration: symplectic, Lie-group, generalized-alpha, IMEX, exponential, adaptive."

[package.metadata.frankensim]
layer = "L3"

[dependencies]
fs-ad = { path = "../fs-ad" }
fs-ga = { path = "../fs-ga" }
fs-la = { path = "../fs-la" }
fs-math = { path = "../fs-math" }
fs-solver = { path = "../fs-solver" }

[dev-dependencies]

[features]
# [F]-gated per the Ambition-Tag rule (bead bk0o.7, Proposal 4).
time-slabs = []

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "slabs"
required-features = ["time-slabs"]
