[package]
name = "fs-xform"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Design parameterizations: FFD, RBF morphs, level-set velocity, SIMP densities — with exact Jacobian actions and composition."

[package.metadata.frankensim]
layer = "L2"

[dependencies]
fs-la = { path = "../fs-la", optional = true }
fs-geom = { path = "../fs-geom" }

[dev-dependencies]
fs-ad = { path = "../fs-ad" }

[features]
# [F]-gated per the Ambition-Tag rule.
manifold-harmonics = ["dep:fs-la"]
elastic-shapes = ["manifold-harmonics"]

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "elastic"
required-features = ["elastic-shapes"]

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "harmonics"
required-features = ["manifold-harmonics"]
