[package]
name = "fs-ir"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "FrankenScript IR: typed AST with spans, isomorphic s-expr/JSON syntaxes, study recognition, inspectable verb lowering."

[package.metadata.frankensim]
layer = "L6"

[dependencies]
fs-evidence = { path = "../fs-evidence" }
fs-geom = { path = "../fs-geom" }
fs-plan = { path = "../fs-plan" }
fs-qty = { path = "../fs-qty" }
fs-regime = { path = "../fs-regime" }
fs-verify = { path = "../fs-verify", features = ["certified-speculation"], optional = true }

[dev-dependencies]

[features]
# [F]-gated per the Ambition-Tag rule: the greedy ladder-walk planner
# ships disabled until its Gauntlet tier + kill metric are green.
ladder-planner = ["dep:fs-verify"]

[lints]
workspace = true

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "anytime"
required-features = ["ladder-planner"]

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "plancal"
required-features = ["ladder-planner"]

# Feature-gated integration target (huq.18): skipped-with-reason when the
# feature is off, never a zero-test pass.
[[test]]
name = "planner"
required-features = ["ladder-planner"]
